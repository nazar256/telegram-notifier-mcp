name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-worker-main
  cancel-in-progress: false

jobs:
  check:
    name: Test and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: check
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap Worker and initialize missing Worker secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if existing_secret_json="$(npx wrangler secret list --format json)"; then
            :
          else
            echo "Failed to list Worker secrets (maybe first deploy). Attempting bootstrap deploy." >&2
            npx wrangler deploy

            if ! existing_secret_json="$(npx wrangler secret list --format json)"; then
              echo "Failed to list Worker secrets after bootstrap deploy." >&2
              exit 1
            fi
          fi

          existing_secret_names="$(
            node -e 'const fs = require("fs"); const input = fs.readFileSync(0, "utf8").trim(); const data = input ? JSON.parse(input) : []; for (const item of data) console.log(item.name);' \
              <<<"$existing_secret_json"
          )"

          required_secrets=(
            OAUTH_JWT_SIGNING_KEY_B64
            UPSTREAM_CONFIG_ENC_KEY_B64
            CSRF_SIGNING_KEY_B64
          )

          for secret_name in "${required_secrets[@]}"; do
            if grep -Fxq "$secret_name" <<<"$existing_secret_names"; then
              echo "Worker secret already initialized: $secret_name"
              continue
            fi

            echo "Initializing missing Worker secret: $secret_name"
            openssl rand -base64 32 | tr -d '\n' | npx wrangler secret put "$secret_name"
          done

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
